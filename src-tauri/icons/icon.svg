<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2a1a08" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0c0e14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffbe00"/>
      <stop offset="100%" stop-color="#d23a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0c0e14"/>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- bolt: Lucide zap (24x24) scaled S=42.5, centered -->
  <polygon points="575,87 277,555 490,555 447,937 745,470 532,470"
    fill="url(#bolt)" filter="url(#glow)"/>
</svg>
