<svg width="640" height="120" viewBox="0 0 640 120" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif" font-size="13">
  <rect x="0.5" y="0.5" width="639" height="119" rx="10" fill="#0D1117" stroke="#30363D"/>

  <!-- step 1: scan -->
  <g>
    <circle cx="100" cy="55" r="26" fill="none" stroke="#58A6FF" stroke-width="2" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.4s" begin="0.2s" fill="freeze"/>
    </circle>
    <circle cx="100" cy="55" r="4" fill="#58A6FF" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
      <animate attributeName="r" values="4;10;4" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="98" text-anchor="middle" fill="#E6EDF3" opacity="0">Scan ports
      <animate attributeName="opacity" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </text>
  </g>

  <path d="M135 55 L195 55" stroke="#30363D" stroke-width="2" stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" to="0" dur="0.5s" begin="1.0s" fill="freeze"/>
  </path>

  <!-- step 2: identify -->
  <g>
    <circle cx="270" cy="55" r="26" fill="none" stroke="#7EE787" stroke-width="2" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
    </circle>
    <text x="270" y="61" text-anchor="middle" fill="#7EE787" font-weight="700" opacity="0">node
      <animate attributeName="opacity" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="270" y="98" text-anchor="middle" fill="#E6EDF3" opacity="0">Identify app
      <animate attributeName="opacity" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>
  </g>

  <path d="M305 55 L365 55" stroke="#30363D" stroke-width="2" stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" to="0" dur="0.5s" begin="2.3s" fill="freeze"/>
  </path>

  <!-- step 3: act -->
  <g>
    <circle cx="440" cy="55" r="26" fill="none" stroke="#FF7B72" stroke-width="2" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.4s" begin="2.8s" fill="freeze"/>
    </circle>
    <path d="M430 45 L450 65 M450 45 L430 65" stroke="#FF7B72" stroke-width="2.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.3s" begin="3.1s" fill="freeze"/>
    </path>
    <text x="440" y="98" text-anchor="middle" fill="#E6EDF3" opacity="0">Kill or restart
      <animate attributeName="opacity" to="1" dur="0.3s" begin="3.1s" fill="freeze"/>
    </text>
  </g>

  <path d="M475 55 L535 55" stroke="#30363D" stroke-width="2" stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" to="0" dur="0.5s" begin="3.5s" fill="freeze"/>
  </path>

  <!-- step 4: free -->
  <g>
    <circle cx="580" cy="55" r="26" fill="none" stroke="#58A6FF" stroke-width="2" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.4s" begin="4.0s" fill="freeze"/>
    </circle>
    <text x="580" y="61" text-anchor="middle" fill="#58A6FF" font-weight="700" font-size="11" opacity="0">FREE
      <animate attributeName="opacity" to="1" dur="0.3s" begin="4.3s" fill="freeze"/>
    </text>
    <text x="580" y="98" text-anchor="middle" fill="#8B949E" opacity="0">port available
      <animate attributeName="opacity" to="1" dur="0.3s" begin="4.3s" fill="freeze"/>
    </text>
  </g>
</svg>
